name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Build, test, and lint run in parallel with e2e
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test
      - run: yarn lint
      - run: yarn build
      - name: Verify detached/action.yml is in sync
        run: |
          # The `detached/action.yml` should differ minimally from the top-level `action.yml`:
          # 1. The path to the JavaScript entry point needs to be relative to `detached/`, i.e.
          #    `../lib/<path>` instead of `lib/<path>`.
          # 2. The default value for the `detached` parameter should be `true`, not `false`.
          sed -e 's/lib\//..\/&/g' \
            -e '/detached:/{:1;n;s/\(default: \).*/\1"true"/;t;b1}' \
            <action.yml >detached/action.yml.expected
          diff -u detached/action.yml detached/action.yml.expected
        if: runner.os == 'Linux'

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install act
        run: |
          # Download latest act release
          curl -sL https://github.com/nektos/act/releases/latest/download/act_Linux_x86_64.tar.gz -o /tmp/act.tar.gz
          sudo tar -xzf /tmp/act.tar.gz -C /usr/local/bin act
      - run: yarn install --frozen-lockfile
      - run: yarn test:e2e
